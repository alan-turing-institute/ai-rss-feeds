#
# Selector mapping:
# - item_container_selector -> <a class="...listItem"> inside PublicationList list items
# - item_link_selector -> href on that <a>
# - item_title_selector -> <span class="...title"> inside that <a>
# - item_date_selector -> <time> inside that <a>
[feeds.anthropic-research]
feed_title = "Anthropic Research"
source_url = "https://www.anthropic.com/research"
item_container_selector = "div[class*='PublicationList'] ul li > a[class*='listItem']"
item_link_selector = "::attr(href)"
