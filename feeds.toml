# The AI Security Institute (AISI) Blog spider.
#
# Source: https://www.aisi.gov.uk/blog
#
# Page structure (simplified):
#     <div role="listitem" class="work-card-wrapper w-dyn-item">
#       <div class="card in-grid">
#         <a href="/blog/<slug>" class="... w-inline-block">
#           <h3 class="text-size-lg">Title</h3>
#         </a>
#         <div class="flex_tags ...">
#           ...
#           <p fs-list-field="date" ...>Mar 31, 2026</p>
#         </div>
#         <div class="flex-grow">
#           <p fs-list-field="description" ...>Description text</p>
#         </div>
#       </div>
#     </div>
[feeds.aisi-blog]
feed_title = "AISI Blog (AI Security Institute)"
feed_description = "Updates on AISI's work - AI Security Institute"
source_url = "https://www.aisi.gov.uk/blog"
item_container_selector = "div.work-card-wrapper"
item_link_selector = "a.w-inline-block[href^='/blog/']::attr(href)"
item_title_selector = "h3::text"
item_date_selector = "p[fs-list-field='date']::text"
item_description_selector = "p[fs-list-field='description']::text"

# Allen Institute for AI (Ai2) News spider.
#
# Source: https://allenai.org/news
#
# Page structure (simplified):
#     <div class="... grid-tc_repeat(3,_1fr) ...">  <- 3-column news grid
#       <div class="... grid-tr_subgrid ...">        <- one card per item
#         <div>...image...</div>
#         <h2>
#           <span class="...wideCardEyebrow">March 2026</span>
#           <span class="sr_true"> - </span>
#           Title text                               <- direct text node of <h2>
#         </h2>
#         <div>...description paragraph...</div>
#         <div>
#           <a href="/blog/<slug>">Read post</a>
#         </div>
#       </div>
#     </div>
#
# Note: dates are month+year only (e.g. "March 2026"); dateparser maps these to
# the first of that month.
[feeds.allenai-news]
feed_title = "Ai2 News (Allen Institute for AI)"
source_url = "https://allenai.org/news"
item_container_selector = "div[class*='grid-tr_subgrid']"
item_link_selector = "a[href^='/blog/']::attr(href)"
item_title_selector = "h2::text"
item_date_selector = "h2 span:first-child::text"
item_description_selector = "div > p::text"

# Anthropic News spider.
#
# Source: https://www.anthropic.com/news
#
# Page structure (simplified):
#     <div class="...PublicationList...">
#       <ul>
#         <li>
#           <a href="/news/<slug>">
#             <div>
#               <time>Apr 6, 2026</time>
#               <span>Announcements</span>
#             </div>
#             <span class="...title">Title text</span>
#           </a>
#         </li>
#       </ul>
#     </div>
#
# Selector mapping:
# - item_container_selector -> <a href="/news/<slug>"> inside PublicationList list items
# - item_link_selector -> href on that <a>
# - item_title_selector -> <span class="...title"> inside that <a>
# - item_date_selector -> <time> inside that <a>
[feeds.anthropic-news]
feed_title = "Anthropic News"
source_url = "https://www.anthropic.com/news"
item_container_selector = "div[class*='PublicationList'] ul li > a[href^='/news/']"
item_link_selector = "::attr(href)"
item_title_selector = "span[class*='title']::text"
item_date_selector = "time::text"

# Anthropic Research spider.
