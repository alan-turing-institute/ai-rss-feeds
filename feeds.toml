[feeds.aisi-blog]
feed_title = "AISI Blog (AI Security Institute)"
feed_description = "Updates on AISI's work - AI Security Institute"
source_url = "https://www.aisi.gov.uk/blog"
item_container_selector = "div.work-card-wrapper"
item_link_selector = "a[href^='/blog/']::attr(href)"
item_title_selector = "h3::text"
item_date_selector = "p[fs-list-field='date']::text"
item_description_selector = "p[fs-list-field='description']::text"

[feeds.allenai-news]
feed_title = "Ai2 News (Allen Institute for AI)"
source_url = "https://allenai.org/news"
item_container_selector = "div[class*='grid-tr_subgrid']"
item_link_selector = "a[href^='/blog/']::attr(href)"
item_title_selector = "h2::text"
item_date_selector = "h2 span:first-child::text"
item_description_selector = "div > p::text"

[feeds.anthropic-news]
feed_title = "Anthropic News"
source_url = "https://www.anthropic.com/news"
format = "nextjs"
item_container_selector = ".. | objects | select(._type == \"post\" or ._type == \"featuredGridLink\")"
item_title_selector = ".title"
item_link_selector = ".url // .slug.current"
item_date_selector = ".date // .publishedOn"
item_description_selector = ".summary"

[feeds.anthropic-research]
feed_title = "Anthropic Research"
source_url = "https://www.anthropic.com/research"
format = "nextjs"
item_container_selector = ".. | objects | select(._type == \"post\" or ._type == \"featuredGridLink\")"
item_title_selector = ".title"
item_link_selector = ".url // .slug.current"
item_date_selector = ".date // .publishedOn"
item_description_selector = ".summary"

[feeds.claude-blog]
feed_title = "Claude Blog"
source_url = "https://claude.com/blog"
item_container_selector = "div.marquee_cms_blog_list_item"
item_title_selector = "h2::text"
item_link_selector = "a[href^='/blog/']::attr(href)"
item_date_selector = "div.u-text-style-caption::text"

[feeds.turing-blog]
feed_title = "Turing Blog (Alan Turing Institute)"
source_url = "https://www.turing.ac.uk/blog"
item_container_selector = "article.node--type-article"
item_title_selector = "h3 a[href^='/blog/'] span::text"
item_link_selector = "h3 a[href^='/blog/']::attr(href)"
item_date_selector = "div.field-published-date span::text"

[feeds.turing-news]
feed_title = "Turing News (Alan Turing Institute)"
source_url = "https://www.turing.ac.uk/news"
item_container_selector = "article.node--type-article"
item_title_selector = "h3 a[href^='/news/'] span::text"
item_link_selector = "h3 a[href^='/news/']::attr(href)"
item_date_selector = "div.field-published-date span::text"

[feeds.mila-news]
feed_title = "Mila News (Quebec AI Institute)"
feed_description = "News and announcements from Mila - Quebec AI Institute."
source_url = "https://mila.quebec/en/news"
item_container_selector = "#news-listing .node--type-news"
item_title_selector = "div.field-name-node-title a::text"
item_link_selector = "div.field-name-node-title a::attr(href)"
item_date_selector = "div.field-name-dynamic-twig-fieldnode-default-date-format-wrapped span::text"

[feeds.the-batch]
feed_title = "The Batch"
feed_description = "Weekly AI news for engineers, executives, and enthusiasts."
source_url = "https://www.deeplearning.ai/the-batch/"
format = "nextjs"
item_container_selector = ".props.pageProps.posts[]"
item_link_selector = ".slug"
item_title_selector = ".title"
item_date_selector = ".published_at"
item_description_selector = ".custom_excerpt // .excerpt"

[feeds.tldr-ai]
feed_title = "TLDR AI"
source_url = "https://tldr.tech/ai/archives"
item_container_selector = "a[href^='/ai/20']"
item_link_selector = "::attr(href)"
item_title_selector = "div::text"
item_date_selector = "::attr(href)"
item_date_regex = "\\d{4}-\\d{2}-\\d{2}"

[feeds.cohere-blog]
feed_title = "Cohere Blog"
feed_description = "Latest news and updates from Cohere."
source_url = "https://cohere.com/blog"
format = "nextjs"
item_container_selector = ".. | objects | select(has(\"initialPosts\")) | .initialPosts[]"
item_title_selector = ".title"
item_link_selector = ".slug | if type == \"object\" then .current else . end"
item_date_selector = ".date // .published_at"

[feeds.mistral-news]
feed_title = "Mistral News"
feed_description = "Latest news and announcements from Mistral AI."
source_url = "https://mistral.ai/news"
format = "nextjs"
item_container_selector = ".. | objects | select(has(\"posts\")) | .posts[]"
item_title_selector = ".title"
item_link_selector = ".slug"
item_date_selector = ".date"
item_description_selector = ".description"

