# Mila - Quebec AI Institute News spider.
#
# Source: https://mila.quebec/en/news
#
# Page structure (simplified):
#     <div id="news-listing">
#       <div class="node node--type-news node--view-mode-teaser ...">
#         <div class="field-name-dynamic-twig-fieldnode-default-date-format-wrapped">
#           <span>08</span><span>Apr</span><span>2026</span>
#         </div>
#         <div class="field-name-node-title">
#           <a href="/en/news/<slug>">Title</a>
#         </div>
#       </div>
#     </div>
[feeds.mila-news]
feed_title = "Mila News (Quebec AI Institute)"
feed_description = "News and announcements from Mila - Quebec AI Institute."
source_url = "https://mila.quebec/en/news"
item_container_selector = "#news-listing .node--type-news.node--view-mode-teaser"
item_title_selector = "div.field-name-node-title a::text"
item_link_selector = "div.field-name-node-title a::attr(href)"
item_date_selector = "div.field-name-dynamic-twig-fieldnode-default-date-format-wrapped span::text"

# DeepLearning.AI The Batch spider.
#
# Source: https://www.deeplearning.ai/the-batch/
#
# Page structure (simplified):
#     <section class="py-12 bg-slate-100">
#       <article data-testid="post-card-large">  <- featured weekly issue card
#         <a href="/the-batch/tag/apr-03-2026/"><div>Apr 03, 2026</div></a>
#         <h2>Issue title</h2>
#         <div class="... line-clamp-3 ...">Issue excerpt</div>
#         <a href="/the-batch/issue-347/"><div class="..." /></a>
#       </article>
#       <article data-sentry-component="PostCard"> <- additional issue cards
#         ... same date/title/description/link pattern ...
#       </article>
#     </section>
#
# Note: this excludes sidebar "Popular Articles" cards by scoping to PostCard and
# post-card-large in the main grid section.
[feeds.the-batch]
feed_title = "The Batch"
feed_description = "Weekly AI news for engineers, executives, and enthusiasts."
source_url = "https://www.deeplearning.ai/the-batch/"
item_container_selector = "section.py-12.bg-slate-100 article[data-testid='post-card-large'], section.py-12.bg-slate-100 article[data-sentry-component='PostCard']"
item_link_selector = "a[href^='/the-batch/issue-']::attr(href)"
item_title_selector = "h2::text"
item_date_selector = "a[href^='/the-batch/tag/'] div::text"
item_description_selector = "div[class*='line-clamp-3']::text"

# TLDR AI Archives spider.
#
# Source: https://tldr.tech/ai/archives
#
# Page structure (simplified):
#     <a href="/ai/2026-04-08">
#       <div class="mb-4">Issue subject line</div>
#     </a>
#
# The page also contains other links, so we scope items to dated archive links.
[feeds.tldr-ai]
feed_title = "TLDR AI"
source_url = "https://tldr.tech/ai/archives"
item_container_selector = "a[href^='/ai/20']"
item_link_selector = "::attr(href)"
item_title_selector = "div::text"
item_date_selector = "::attr(href)"
item_date_regex = "\\d{4}-\\d{2}-\\d{2}"

# Cohere Blog spider.
#
# Source: https://cohere.com/blog
#
# Format: Next.js Flight stream with React Server Components.
# Data is embedded in self.__next_f.push() script tags containing initialPosts array.
#
# Post structure (mixed Sanity CMS and Ghost API):
#   Sanity: { slug: {current: "..."}, title: "...", date: "2026-04-02" }
#   Ghost:  { slug: "...", title: "...", published_at: "2026-03-16T..." }
#
# JSONPath selectors are used for item extraction.
[feeds.cohere-blog]
feed_title = "Cohere Blog"
feed_description = "Latest news and updates from Cohere."
source_url = "https://cohere.com/blog"
format = "nextjs"
item_container_selector = "$..initialPosts[*]"
item_title_selector = "$.title"
item_link_selector = "$.slug.current"
item_date_selector = "$.date"

# Mistral News spider.
#
# Source: https://mistral.ai/news
#
# Format: Next.js Flight stream with React Server Components.
# Data structure with featured article and posts in nextData.
[feeds.mistral-news]
feed_title = "Mistral News"
feed_description = "Latest news and announcements from Mistral AI."
source_url = "https://mistral.ai/news"
format = "nextjs"
item_container_selector = "$..posts[*]"
item_title_selector = "$.title"
item_link_selector = "$.slug"
item_date_selector = "$.date"
item_description_selector = "$.description"

