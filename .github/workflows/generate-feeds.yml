name: Generate RSS feeds

on:
  schedule:
    # Run every 3 hours at 41 minutes past (1:41, 4:41, 7:41, etc.)
    - cron: "41 1/3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # continue-on-error lets the job proceed to the commit step even if some
      # spiders fail, so successfully-generated feeds are still written out.
      - name: Generate feeds
        id: generate
        continue-on-error: true
        run: uv run python generate_feeds.py --no-cache --skip-unchanged

      # always() ensures this runs even when the generate step failed, so any
      # feeds that did succeed get committed.
      - name: Commit and push updated feeds
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- feeds; then
            echo "No feed changes to commit."
            echo "::notice::No feed changes to commit."
            exit 0
          fi

          changed=$(git diff --name-only -- feeds | sed 's|feeds/||')
          echo "::notice::Updated feeds: $(echo "$changed" | tr '\n' ' ')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add feeds
          git commit -m "chore: regenerate RSS feeds ($(echo "$changed" | tr '\n' ' ' | sed 's/ $//'))"
          git push origin "${BRANCH_NAME}"

      # Re-raise the generate failure so the workflow is marked as failed,
      # even though the commit step was allowed to run above.
      - name: Fail if any spiders errored
        if: steps.generate.outcome == 'failure'
        run: exit 1
